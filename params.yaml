preprocess:
  image_size: 224
  seed: 42

validation:
  min_train_class_coverage: 0.99
  fail_on_error: true

augmentation:
  horizontal_flip_p: 0.5
  brightness_contrast_p: 0.3
  color_jitter_p: 0.2

classifier:
  model: resnet50
  batch_size: 32
  epochs: 20
  lr: 0.0001
  weight_decay: 0.01
  freeze_epochs: 5
  label_smoothing: 0.1
  num_workers: 4

detection:
  model: fasterrcnn_resnet50_fpn
  batch_size: 4
  epochs: 10
  lr: 0.0005
  num_workers: 4

yolo:
  model: yolov8m.pt
  epochs: 50
  imgsz: 640
  batch: 16

mlops:
  promotion_margin: 0.01
  promotion_task: classification
  metric_name: val_top1
