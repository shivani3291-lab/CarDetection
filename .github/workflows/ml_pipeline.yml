name: ML Pipeline

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: ruff check src/ tests/ app.py pages/ scripts/

      - name: Run unit tests
        run: pytest tests/ -v -k "not integration"

  pipeline:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Data setup
        run: |
          if [ -f "Car Images.zip" ]; then python scripts/setup_data.py --zip "Car Images.zip"; fi

      - name: Reproduce DVC pipeline
        run: |
          if [ -d data/raw ]; then dvc repro preprocess validate || python -m src.data.preprocess; fi

      - name: Promote model if improved
        run: python -m src.mlops.promote_model || echo "Promotion skipped"
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_URI }}
